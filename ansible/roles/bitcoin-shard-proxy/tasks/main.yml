---
- name: Create proxy system group
  ansible.builtin.group:
    name: "{{ proxy_group }}"
    system: true
    state: present

- name: Create proxy system user
  ansible.builtin.user:
    name: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ proxy_install_dir }}"
    create_home: false
    state: present

- name: Create proxy install directory
  ansible.builtin.file:
    path: "{{ proxy_install_dir }}"
    state: directory
    owner: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    mode: "0755"

- name: Mark install directory as git safe.directory
  community.general.git_config:
    name: safe.directory
    scope: global
    value: "{{ proxy_install_dir }}"

- name: Clone / update bitcoin-shard-proxy repository
  ansible.builtin.git:
    repo: "{{ proxy_repo }}"
    dest: "{{ proxy_install_dir }}"
    version: "{{ proxy_version }}"
    force: false

- name: Set ownership of install directory after clone
  ansible.builtin.file:
    path: "{{ proxy_install_dir }}"
    owner: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    recurse: true

- name: Build bitcoin-shard-proxy binary
  ansible.builtin.command:
    cmd: "{{ go_install_dir }}/bin/go build -buildvcs=false -o {{ proxy_install_dir }}/bitcoin-shard-proxy ."
    chdir: "{{ proxy_install_dir }}"
  environment:
    PATH: "{{ go_install_dir }}/bin:{{ ansible_env.PATH }}"
    CGO_ENABLED: "0"
    GOOS: "{{ 'freebsd' if ansible_os_family == 'FreeBSD' else 'linux' }}"
    GOARCH: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
    HOME: "/tmp"
    GOPATH: "/tmp/gopath"
    GOCACHE: "/tmp/gocache"
  changed_when: true

- name: Install binary to system bin dir
  ansible.builtin.copy:
    src: "{{ proxy_install_dir }}/bitcoin-shard-proxy"
    dest: "{{ proxy_bin_dir }}/bitcoin-shard-proxy"
    remote_src: true
    owner: root
    group: "{{ proxy_group }}"
    mode: "0755"
  notify: Restart bitcoin-shard-proxy

- name: Create config directory
  ansible.builtin.file:
    path: "{{ '/usr/local/etc' if ansible_os_family == 'FreeBSD' else '/etc/bitcoin-shard-proxy' }}"
    state: directory
    owner: root
    group: "{{ proxy_group }}"
    mode: "0750"

- name: Deploy environment config file
  ansible.builtin.template:
    src: config.env.j2
    dest: "{{ '/usr/local/etc/bitcoin-shard-proxy.conf' if ansible_os_family == 'FreeBSD' else '/etc/bitcoin-shard-proxy/config.env' }}"
    owner: root
    group: "{{ proxy_group }}"
    mode: "0640"
  notify: Restart bitcoin-shard-proxy

- name: Deploy systemd service unit (Linux)
  ansible.builtin.template:
    src: bitcoin-shard-proxy.service.j2
    dest: /etc/systemd/system/bitcoin-shard-proxy.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family != 'FreeBSD'
  notify:
    - Reload systemd
    - Restart bitcoin-shard-proxy

- name: Deploy rc.d service script (FreeBSD)
  ansible.builtin.template:
    src: bitcoin_shard_proxy.rc.j2
    dest: /usr/local/etc/rc.d/bitcoin_shard_proxy
    owner: root
    group: wheel
    mode: "0755"
  when: ansible_os_family == 'FreeBSD'
  notify: Restart bitcoin-shard-proxy

- name: Enable and start bitcoin-shard-proxy (Linux)
  ansible.builtin.systemd:
    name: bitcoin-shard-proxy
    enabled: true
    state: started
  when: ansible_os_family != 'FreeBSD'

- name: Enable bitcoin-shard-proxy in rc.conf (FreeBSD)
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: '^bitcoin_shard_proxy_enable='
    line: 'bitcoin_shard_proxy_enable="YES"'
  when: ansible_os_family == 'FreeBSD'

- name: Start bitcoin-shard-proxy (FreeBSD)
  ansible.builtin.service:
    name: bitcoin_shard_proxy
    state: started
  when: ansible_os_family == 'FreeBSD'
