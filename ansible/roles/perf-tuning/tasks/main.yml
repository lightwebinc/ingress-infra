---
- name: Perf-tuning role — short-circuit if disabled
  ansible.builtin.meta: end_play
  when: not perf_tuning_enabled | bool

- name: Apply sysctls for UDP buffers + RX busy-poll
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/65-perf-tuning.conf
    reload: true
  loop: "{{ perf_tuning_sysctls | dict2items }}"

- name: Bump txqueuelen via systemd-networkd link drop-in
  when: perf_tuning_iface | length > 0
  block:
    - name: Ensure systemd-networkd .link.d directory
      ansible.builtin.file:
        path: "/etc/systemd/network/10-{{ perf_tuning_iface }}.link.d"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render link drop-in for {{ perf_tuning_iface }}
      ansible.builtin.copy:
        dest: "/etc/systemd/network/10-{{ perf_tuning_iface }}.link.d/perf.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by ingress-infra perf-tuning role.
          [Link]
          TransmitQueueLength={{ perf_tuning_txqueuelen }}
      notify: Reapply link settings

- name: Stop and mask irqbalance (incompatible with manual IRQ affinity)
  when: perf_tuning_disable_irqbalance | bool
  ansible.builtin.systemd:
    name: irqbalance
    enabled: false
    state: stopped
    masked: true
  failed_when: false

- name: Disable deep C-states via systemd oneshot (runtime)
  when: perf_tuning_disable_cstates | bool
  block:
    - name: Install cstate-disable script
      ansible.builtin.copy:
        dest: /usr/local/sbin/perf-tuning-disable-cstates
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          # Managed by ingress-infra perf-tuning role.
          set -eu
          for cpu in /sys/devices/system/cpu/cpu[0-9]*; do
              for n in {{ perf_tuning_cstates_to_disable | join(' ') }}; do
                  f="$cpu/cpuidle/state${n}/disable"
                  [ -w "$f" ] && echo 1 > "$f" || true
              done
          done

    - name: Install cstate-disable systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/perf-tuning-cstates.service
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by ingress-infra perf-tuning role.
          [Unit]
          Description=Disable deep CPU C-states for low-latency networking
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/perf-tuning-disable-cstates
          RemainAfterExit=true

          [Install]
          WantedBy=multi-user.target

    - name: Enable + run cstate-disable now
      ansible.builtin.systemd:
        name: perf-tuning-cstates.service
        daemon_reload: true
        enabled: true
        state: started

- name: Append intel_idle/processor max_cstate to GRUB cmdline
  when:
    - perf_tuning_grub_cmdline | bool
    - ansible_os_family == 'Debian'
  block:
    - name: Ensure intel_idle.max_cstate=1 in GRUB_CMDLINE_LINUX_DEFAULT
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT="(?:(?!intel_idle\.max_cstate=).)*?)"'
        replace: '\1 intel_idle.max_cstate=1 processor.max_cstate=1"'
      notify:
        - Update grub
        - Warn perf-tuning reboot
