---
- name: Create proxy system group
  ansible.builtin.group:
    name: "{{ proxy_group }}"
    system: true
    state: present

- name: Create proxy system user
  ansible.builtin.user:
    name: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ proxy_install_dir }}"
    create_home: false
    state: present

- name: Create proxy install directory
  ansible.builtin.file:
    path: "{{ proxy_install_dir }}"
    state: directory
    owner: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    mode: "0755"

- name: Mark install directory as git safe.directory
  community.general.git_config:
    name: safe.directory
    scope: global
    value: "{{ proxy_install_dir }}"

- name: Clone / update shard-proxy repository
  ansible.builtin.git:
    repo: "{{ proxy_repo }}"
    dest: "{{ proxy_install_dir }}"
    version: "{{ proxy_version }}"
    force: false
  when: proxy_local_binary | default('') | length == 0

- name: Push pre-built proxy binary (skips git/build)
  ansible.builtin.copy:
    src: "{{ proxy_local_binary }}"
    dest: "{{ proxy_install_dir }}/shard-proxy"
    owner: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    mode: "0755"
  when: proxy_local_binary | default('') | length > 0

- name: Set ownership of install directory after clone
  ansible.builtin.file:
    path: "{{ proxy_install_dir }}"
    owner: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    recurse: true
  when: proxy_local_binary | default('') | length == 0

- name: Stat existing proxy binary in install dir
  ansible.builtin.stat:
    path: "{{ proxy_install_dir }}/shard-proxy"
  register: proxy_binary_stat
  when: proxy_local_binary | default('') | length == 0

- name: Build shard-proxy binary
  ansible.builtin.command:
    cmd: "{{ go_install_dir }}/bin/go build -buildvcs=false -o {{ proxy_install_dir }}/shard-proxy ."
    chdir: "{{ proxy_install_dir }}"
  environment:
    PATH: "{{ go_install_dir }}/bin:{{ ansible_env.PATH }}"
    CGO_ENABLED: "0"
    GOOS: "{{ 'freebsd' if ansible_os_family == 'FreeBSD' else 'linux' }}"
    GOARCH: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
    HOME: "/tmp"
    GOPATH: "/tmp/gopath"
    GOCACHE: "/tmp/gocache"
  changed_when: true
  when:
    - proxy_local_binary | default('') | length == 0
    - not proxy_binary_stat.stat.exists or (proxy_force_build | default(false) | bool)

- name: Set ownership on pushed/built binary
  ansible.builtin.file:
    path: "{{ proxy_install_dir }}/shard-proxy"
    owner: "{{ proxy_user }}"
    group: "{{ proxy_group }}"
    mode: "0755"

- name: Install binary to system bin dir
  ansible.builtin.copy:
    src: "{{ proxy_install_dir }}/shard-proxy"
    dest: "{{ proxy_bin_dir }}/shard-proxy"
    remote_src: true
    owner: root
    group: "{{ proxy_group }}"
    mode: "0755"
  notify: Restart shard-proxy

- name: Create config directory
  ansible.builtin.file:
    path: "{{ '/usr/local/etc' if ansible_os_family == 'FreeBSD' else '/etc/shard-proxy' }}"
    state: directory
    owner: root
    group: "{{ proxy_group }}"
    mode: "0750"

- name: Deploy environment config file
  ansible.builtin.template:
    src: config.env.j2
    dest: "{{ '/usr/local/etc/shard-proxy.conf' if ansible_os_family == 'FreeBSD' else '/etc/shard-proxy/config.env' }}"
    owner: root
    group: "{{ proxy_group }}"
    mode: "0640"
  notify: Restart shard-proxy

- name: Deploy systemd service unit (Linux)
  ansible.builtin.template:
    src: shard-proxy.service.j2
    dest: /etc/systemd/system/shard-proxy.service
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family != 'FreeBSD'
  notify:
    - Reload systemd
    - Restart shard-proxy

- name: Deploy rc.d service script (FreeBSD)
  ansible.builtin.template:
    src: shard_proxy.rc.j2
    dest: /usr/local/etc/rc.d/shard_proxy
    owner: root
    group: wheel
    mode: "0755"
  when: ansible_os_family == 'FreeBSD'
  notify: Restart shard-proxy

- name: Enable and start shard-proxy (Linux)
  ansible.builtin.systemd:
    name: shard-proxy
    enabled: true
    state: started
  when: ansible_os_family != 'FreeBSD'

- name: Enable shard-proxy in rc.conf (FreeBSD)
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: '^shard_proxy_enable='
    line: 'shard_proxy_enable="YES"'
  when: ansible_os_family == 'FreeBSD'

- name: Start shard-proxy (FreeBSD)
  ansible.builtin.service:
    name: shard_proxy
    state: started
  when: ansible_os_family == 'FreeBSD'
