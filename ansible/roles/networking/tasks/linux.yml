---
- name: Enable IPv4/IPv6 forwarding via sysctl
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/60-ingress-infra.conf
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
    - net.ipv6.conf.all.mc_forwarding

- name: Deploy netplan config for ethernet egress
  ansible.builtin.template:
    src: netplan-ethernet.yaml.j2
    dest: /etc/netplan/60-ingress-infra.yaml
    owner: root
    group: root
    mode: "0600"
  when: egress_mode == 'ethernet'
  notify: Apply netplan

- name: Deploy netplan config for GRE tunnel egress
  ansible.builtin.template:
    src: netplan-gre.yaml.j2
    dest: /etc/netplan/61-ingress-infra-gre.yaml
    owner: root
    group: root
    mode: "0600"
  when: egress_mode == 'gre'
  notify: Apply netplan

- name: Deploy BGP VIP netplan config
  ansible.builtin.template:
    src: netplan-vip.yaml.j2
    dest: /etc/netplan/62-ingress-infra-vip.yaml
    owner: root
    group: root
    mode: "0600"
  when: enable_bgp | bool and (bgp_vip | length > 0 or bgp_vip6 | length > 0)
  notify: Apply netplan

- name: Apply multicast route immediately (Linux)
  ansible.builtin.command:
    argv:
      - ip
      - -6
      - route
      - replace
      - "{{ networking_mc_route_prefix }}"
      - dev
      - "{{ networking_egress_iface }}"
  register: networking_mc_route_result
  changed_when: networking_mc_route_result.rc == 0
  failed_when: false
