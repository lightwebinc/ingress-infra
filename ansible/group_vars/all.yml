---
# ============================================================
# ingress-infra Ansible group_vars/all.yml
# Override any variable per-host in inventory/hosts.yml
# ============================================================

# ------------------------------------------------------------
# shard-proxy source and build
# ------------------------------------------------------------
proxy_repo: "https://github.com/lightwebinc/shard-proxy.git"
proxy_version: "main"
proxy_install_dir: "/opt/shard-proxy"
proxy_bin_dir: "/usr/local/bin"
proxy_user: "shard-proxy"
proxy_group: "shard-proxy"

# Go toolchain version (used when building from source)
go_version: "1.25.10"
go_install_dir: "/usr/local/go"

# ------------------------------------------------------------
# Proxy runtime configuration
# All flags have env-var equivalents set in the service unit
# ------------------------------------------------------------
listen_addr: "[::]"
udp_listen_port: 8725
tcp_listen_port: 0
# Miner-tier ingress gate. The user ports above are transaction-only; BRC-131
# block / BRC-133 coinbase / BRC-132 subtree-data frames are dropped there and
# may only enter via the miner ingress below. Leave at 0 to ingest
# transactions only. Restrict the miner port to miner-tier sources at the
# firewall / provider ACL (see docs/networking.md). 0 = disabled.
miner_listen_port: 0
miner_tcp_listen_port: 0
# Legacy single-port behaviour: user port also accepts privileged frames.
tx_accept_privileged: false
egress_port: 9001
shard_bits: 2
mc_scope: "site"
mc_group_id: "0x000B"
num_workers: 0
metrics_addr: ":9100"
otlp_endpoint: ""
otlp_interval: "30s"
# Unified logging — see bsv-multicast/docs/UnifiedLogging/unified-logging-plan.md
log_format: "json"            # text | json (json for fleet aggregation; collector phase is deferred)
log_level: "info"             # debug|info|warn|error; runtime-togglable via POST /loglevel + SIGHUP
trace_sampling: 0             # 0..1 trace head sampling (0 = off; exports via otlp_endpoint; control-plane only)
drain_timeout: "0s"           # Pre-drain delay on shutdown; set to ≥ LB health-check interval in production
frag_mtu: 0                   # BRC-130 fragmentation MTU (0 = disabled)
proxy_debug: false

# Two-tier ingress TxID deduplication (proxy-side)
# tier-1: in-process LRU (always active when txid_dedup_local_cap > 0)
# tier-2: modular shard-common/cache backend SETNX (memory|redis|aerospike)
# Set txid_dedup_local_cap: 0 to disable ingress dedup entirely.
# See bsv-multicast/docs/ModularCacheBackend/modular-cache-backend.md
txid_dedup_local_cap: 1048576   # tier-1 LRU capacity; 0 = disable
txid_dedup_backend: ""          # redis|aerospike|memory|none; empty infers redis when addr set, else none
txid_dedup_redis_addr: ""       # Redis/Valkey/Dragonfly addr; empty = local-only
txid_dedup_aerospike_hosts: ""  # comma-separated host:port (required when backend=aerospike)
txid_dedup_aerospike_namespace: "cache"
txid_dedup_aerospike_set: "bsp"
txid_dedup_prefix: "bsp:tx:"   # key prefix — must match listener's ingress_set_prefix
txid_dedup_ttl: "10m"           # tier-2 entry TTL

# ------------------------------------------------------------
# Networking
# ------------------------------------------------------------
egress_mode: "ethernet"       # ethernet | gre
egress_iface: "eth1"          # interface name or list of names

# Multicast route prefix for the egress interface.
# Defaults to "" which means auto-derive from mc_scope:
#   link   -> ff02::/16
#   site   -> ff05::/16
#   org    -> ff08::/16
#   global -> ff0e::/16
# Override this when using a narrower assigned prefix (mc_group_id set).
mc_route_prefix: ""

# GRE tunnel (only used when egress_mode == gre)
# The fabric is IPv6-only: local/remote endpoints are IPv6 addresses,
# the tunnel mode is ip6gre (Linux) / gif (FreeBSD).
gre_local_ip6: ""         # IPv6 address of the local tunnel endpoint
gre_remote_ip6: ""        # IPv6 address of the remote tunnel endpoint
gre_iface: "gre6-bsp"     # interface name for the tunnel
gre_inner_ipv6: ""        # IPv6 address/prefix assigned inside the tunnel

# ------------------------------------------------------------
# BGP (optional)
# ------------------------------------------------------------
enable_bgp: false
bgp_daemon: "bird2"           # bird2 | frr

bgp_prefix: []               # IPv4 BGP prefixes announced by all nodes, e.g. ["192.0.2.0/24"]
bgp_vip: ""                  # IPv4 loopback VIP, e.g. "192.0.2.1"
bgp_prefix6: []              # IPv6 BGP prefixes announced by all nodes, e.g. ["2001:db8::/48"]
bgp_vip6: ""                 # IPv6 loopback VIP, e.g. "2001:db8::1"

bgp_local_as: 65001
bgp_peer_as: 65000
bgp_peer_ip: ""               # IPv4 BGP peer address (leave empty if peer is v6-only)
bgp_peer_ip6: ""              # IPv6 BGP peer address
bgp_router_id: "{{ ansible_default_ipv4.address }}"
bgp_hold_time: 90
bgp_keepalive: 30
bgp_password: ""
# Health path the bsp-bgp-check timer probes to enable/withdraw the anycast VIP.
# /healthz (liveness) = withdraw when the proxy is dead; /readyz = withdraw at
# drain start (graceful anycast shed for a hostNetwork proxy pod). See I1.
bgp_health_path: "/healthz"

# iBGP peers (used by the bgp-ibgp role, playbook: bgp-ibgp.yml)
# Each entry: { peer_ip: "", peer_ip6: "", description: "" }
# At least one of peer_ip or peer_ip6 is required per entry.
# Include both for dual-stack peers.
bgp_ibgp_peers: []
