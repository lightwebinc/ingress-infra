name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint ansible/

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint>=25.0

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install 'community.general>=10.0' 'ansible.posix>=2.0'

      - name: Run ansible-lint
        run: ansible-lint ansible/

  trivy:
    name: trivy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: trivy config scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: terraform/
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: terraform/examples/aws-ec2/.trivyignore

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - terraform/modules/ingress-node
          - terraform/modules/bgp-anycast
          - terraform/examples/generic
          - terraform/examples/aws-ec2
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - name: terraform init
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.dir }}
